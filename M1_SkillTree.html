<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Tree – Informatiker/in EFZ Applikationsentwicklung</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#eef2f7;color:#1a202c;overflow-x:hidden}

/* ── Header ── */
#hdr{background:#1a365d;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.35)}
#hdr h1{font-size:16px;font-weight:700;line-height:1.3}
#hdr .sub{font-size:11px;opacity:.65;margin-top:2px}
#prog-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0}
#prog-bar{width:180px;height:9px;background:rgba(255,255,255,.25);border-radius:5px;overflow:hidden}
#prog-fill{height:100%;background:#68d391;border-radius:5px;transition:width .4s ease;width:0%}
#prog-lbl{font-size:13px;font-weight:700;min-width:38px;text-align:right}
#btn-reset{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 11px;border-radius:6px;cursor:pointer;font-size:11px;margin-left:8px}
#btn-reset:hover{background:rgba(255,255,255,.22)}

/* ── Tree scroll area ── */
#tree-scroll{overflow:auto;padding:28px 28px 40px}
#tree-canvas{position:relative}
#tree-canvas svg{position:absolute;top:0;left:0;pointer-events:none}

/* ── Nodes ── */
.node{position:absolute;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;user-select:none;border:2px solid transparent;transition:transform .15s,box-shadow .15s;padding:4px 5px}
.node.clickable{cursor:pointer}
.node.clickable:hover{transform:scale(1.07);box-shadow:0 4px 14px rgba(0,0,0,.18)}
.node.locked{background:#e9edf2;border-color:#c8d0da;color:#a0aec0;cursor:default}
.node.active{background:#fff;border-color:#3182ce;color:#2d3748;box-shadow:0 2px 7px rgba(49,130,206,.18)}
.node.partial{background:#ebf8ff;border-color:#63b3ed;color:#2c5282;box-shadow:0 2px 7px rgba(99,179,237,.2)}
.node.complete{background:#c6f6d5;border-color:#38a169;color:#22543d;box-shadow:0 2px 7px rgba(56,161,105,.18)}
.node.special{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#d97706;color:#78350f;box-shadow:0 4px 18px rgba(217,119,6,.35)}
.node.special.locked{background:#e9edf2;border-color:#c8d0da;color:#a0aec0;box-shadow:none}

.node-supra{font-size:9px;opacity:.7;font-weight:600;margin-bottom:1px;letter-spacing:.03em}
.node-label{font-size:9.5px;font-weight:600;line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;max-width:100%}
.node-icon{font-size:15px;line-height:1;margin-bottom:2px}

/* Pips (Erklärt / Geübt / Selbständig) */
.pips{display:flex;gap:3px;margin-top:4px}
.pip{width:8px;height:8px;border-radius:50%;background:#d1d5db;border:1.5px solid #9ca3af;flex-shrink:0}
.pip.s1{background:#63b3ed;border-color:#3182ce}
.pip.s2{background:#4299e1;border-color:#2b6cb0}
.pip.s3{background:#38a169;border-color:#276749}

/* Branch colour accents (applied in JS) */
.ba{border-color:#3182ce!important;background:#ebf8ff!important;color:#2c5282!important}
.bb{border-color:#38a169!important;background:#f0fff4!important;color:#22543d!important}
.bc{border-color:#e53e3e!important;background:#fff5f5!important;color:#c53030!important}
.bg{border-color:#805ad5!important;background:#faf5ff!important;color:#553c9a!important}
.bh{border-color:#dd6b20!important;background:#fffaf0!important;color:#7b341e!important}

/* HK branch tint when partial/active */
.hk-A.active,.hk-A.partial{border-color:#63b3ed!important;background:#ebf8ff!important;color:#2c5282!important}
.hk-B.active,.hk-B.partial{border-color:#68d391!important;background:#f0fff4!important;color:#22543d!important}
.hk-C.active,.hk-C.partial{border-color:#fc8181!important;background:#fff5f5!important;color:#c53030!important}
.hk-G.active,.hk-G.partial{border-color:#b794f4!important;background:#faf5ff!important;color:#553c9a!important}
.hk-H.active,.hk-H.partial{border-color:#f6ad55!important;background:#fffaf0!important;color:#7b341e!important}

/* ── Detail panel ── */
#detail{position:fixed;right:0;top:0;bottom:0;width:340px;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.14);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s ease}
#detail.open{transform:translateX(0)}
#detail-head{background:#1a365d;color:#fff;padding:16px 18px;flex-shrink:0}
#detail-head .did{font-size:11px;opacity:.65;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
#detail-head .dtitle{font-size:15px;font-weight:700;line-height:1.3}
#detail-body{flex:1;overflow-y:auto;padding:18px}
#detail-desc{font-size:12.5px;color:#4a5568;line-height:1.65;margin-bottom:18px}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:#718096;letter-spacing:.07em;margin-bottom:8px}
.stages{display:flex;gap:8px;margin-bottom:18px}
.stage-box{flex:1;border:2px solid #e2e8f0;border-radius:8px;padding:10px 6px;text-align:center;font-size:11px;font-weight:600;color:#a0aec0;background:#f7fafc;transition:all .2s}
.stage-box .si{font-size:16px;margin-bottom:3px}
.stage-box.done{border-color:#38a169;color:#22543d;background:#f0fff4}
.stage-box.current{border-color:#3182ce;color:#2b6cb0;background:#ebf8ff;box-shadow:0 0 0 3px rgba(49,130,206,.12)}
#act-btn{width:100%;padding:12px;background:#3182ce;color:#fff;border:none;border-radius:8px;font-size:13.5px;font-weight:700;cursor:pointer;transition:background .2s}
#act-btn:hover:not(:disabled){background:#2b6cb0}
#act-btn:disabled{background:#a0aec0;cursor:default}
#det-close{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:12px}

/* ── Toast ── */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:#2d3748;color:#fff;padding:11px 20px;border-radius:8px;font-size:12.5px;font-weight:600;transition:transform .3s;z-index:300;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.milestone{background:linear-gradient(135deg,#553c9a,#805ad5)}

/* ── Legend ── */
#legend{position:fixed;bottom:16px;right:16px;background:#fff;border-radius:8px;padding:11px 14px;box-shadow:0 2px 10px rgba(0,0,0,.1);font-size:10.5px;z-index:50}
#legend h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#718096;margin-bottom:7px}
.li{display:flex;align-items:center;gap:7px;margin-bottom:4px;color:#4a5568}
.ld{width:13px;height:13px;border-radius:3px;border:2px solid;flex-shrink:0}
.pip-row{display:flex;gap:2px;align-items:center}
.pip-row .pip{width:7px;height:7px}
</style>
</head>

<div id="hdr">
  <div>
    <h1>Skill Tree · Informatiker/in EFZ Applikationsentwicklung</h1>
    <div class="sub">Modul 1 – Fortschrittsvisualisierung &amp; Kompetenztracking (Prototyp)</div>

<!-- Detail panel -->

<div id="toast"></div>

<div id="legend">

</div>

<script>

// BILDUNGSPLAN DATA
// ============================================================

     hks:[
      {id:'b1',bez:'Den eigenen ICT-Arbeitsplatz einrichten',
       desc:'Informatikerinnen und Informatiker setzen den Computer mit Betriebssystem auf, verbinden ihn mit dem Netzwerk, konfigurieren Sicherheitsmassnahmen und richten den Arbeitsplatz ergonomisch ein.'},

     hks:[

       desc:'Informatikerinnen und Informatiker führen explorative Datenanalysen durch, wählen geeignete Darstellungsformen aus und stellen Daten anonymisiert bereit.'},
     ]},
    {id:'G', cls:'bg', hkcls:'hk-G',
     bez:'Entwickeln von Applikationen',
     hks:[
      {id:'g1',bez:'Anforderungen an Applikationen analysieren und dokumentieren',
       desc:'Informatikerinnen und Informatiker halten Kundenbedürfnisse in fachlichen und technischen Anforderungen fest, entwickeln Nutzermodelle anhand von Personas und schätzen Aufwand und Komplexität im Team ab.'},

       desc:'Informatikerinnen und Informatiker erstellen MockUps und Wireframes, überprüfen technische Machbarkeit (Responsiveness, Barrierefreiheit) und entwickeln anhand von Prototypen funktionale Benutzerschnittstellen.'},
      {id:'g3',bez:'Sicherheit von Applikationen beurteilen und dokumentieren',

    {id:'H', cls:'bh', hkcls:'hk-H',

     hks:[

       desc:'Informatikerinnen und Informatiker analysieren Anforderungen an den Betrieb, definieren eine geeignete Plattform (Cloud, On-Premise, Hybrid) und wählen geeignete Services und Ressourcen aus.'},
      {id:'h2',bez:'Auslieferungsprozess von Applikationen definieren',

      {id:'h3',bez:'Auslieferungsprozess von Applikationen durchführen',
       desc:'Informatikerinnen und Informatiker richten Services ein, schreiben Automatisierungsskripte, paketieren Applikationen (z.B. Docker) und überprüfen den gesamten Auslieferungsprozess.'},
      {id:'h4',bez:'Applikationen überwachen und Probleme beheben',
       desc:'Informatikerinnen und Informatiker definieren und konfigurieren Monitoring-Tools, analysieren auftretende Probleme strukturiert und setzen vereinbarte Korrekturmassnahmen um.'},
     ]},
  ]

// ============================================================
// STATE
// ============================================================
const SK = 'st_v2';
let ST;

function buildFresh() {
  const s = {ueks:{}, hks:{}, milestones:[]};
  BP.ueks.forEach(u => s.ueks[u.id] = false);
  BP.branches.forEach(b => b.hks.forEach(k => s.hks[k.id] = 0)); // 0-3
  return s;
}

function loadST() {
  try { const r = localStorage.getItem(SK); if(r) return JSON.parse(r); } catch(e){}
  return buildFresh();
}
function saveST() { try { localStorage.setItem(SK, JSON.stringify(ST)); } catch(e){} }

function resetState() {
  if (!confirm('Fortschritt wirklich zurücksetzen?')) return;
  localStorage.removeItem(SK);
  ST = buildFresh();
  achieved.clear();
  renderAll();
  toast('Fortschritt zurückgesetzt.', false);
}

ST = loadST();

// ============================================================
// DERIVED
// ============================================================
const allUEKsDone = () => BP.ueks.every(u => ST.ueks[u.id]);
const bljDone = () => allUEKsDone();
const hkUnlocked = () => bljDone();
const branchDone = b => b.hks.every(k => ST.hks[k.id] === 3);
const allHKsDone = () => BP.branches.every(b => branchDone(b));
const ipaUnlocked = () => allHKsDone();

function totalHKStages() {
  return BP.branches.reduce((s,b) => s + b.hks.reduce((ss,k) => ss + ST.hks[k.id], 0), 0);
}
function totalHKs() { return BP.branches.reduce((s,b) => s + b.hks.length, 0); }
function completedHKs() { return BP.branches.reduce((s,b) => s + b.hks.filter(k => ST.hks[k.id]===3).length, 0); }

function getProgress() {
  const uekPts = BP.ueks.filter(u => ST.ueks[u.id]).length;
  const hkPts  = totalHKStages();
  const total  = BP.ueks.length + totalHKs()*3;
  return Math.round((uekPts + hkPts) / total * 100);
}

// ============================================================
// LAYOUT CONSTANTS
// ============================================================
const UW=108, UH=52;          // UEK node
const BW=118, BH=56;          // BLJ / Branch node
const HW=86,  HH=58;          // HK node
const IW=100, IH=56;          // IPA node
const EW=112, EH=68;          // EFZ node
const HS=HW+12;               // HK horizontal spacing
const MAX_HK=7;               // branch A

// Fixed x-centres
const UX  = 30+UW/2;                         // 84
const BLX = UX+UW/2+50+BW/2;                 // 84+54+50+59 = 247 (≈247)
const BRX = BLX+BW/2+40+BW/2;               // 247+59+40+59 = 405 (≈405)
const HX0 = BRX+BW/2+32+HW/2;               // 405+59+32+43 = 539 (≈539)  ← centre of first HK
const IPX = HX0+(MAX_HK-1)*HS+HW/2+46+IW/2; // after widest row
const EFX = IPX+IW/2+46+EW/2;

const CANVAS_W = EFX+EW/2+32;

// Y positions: 5 branches equally spaced
const BR_GAP = 42;
const BR_H   = HH;
const TOTAL_BR_H = BP.branches.length*BR_H + (BP.branches.length-1)*BR_GAP;
const TOP_PAD = 40;
const brY = BP.branches.map((_,i) => TOP_PAD + i*(BR_H+BR_GAP) + BR_H/2);

// BLJ, IPA, EFZ y = vertical centre of all branches
const MID_Y = (brY[0]+brY[brY.length-1])/2;

// UEK y positions distributed around MID_Y
const UEK_SP = 54;
const uekY = BP.ueks.map((_,i) => MID_Y - (BP.ueks.length-1)*UEK_SP/2 + i*UEK_SP);

const CANVAS_H = Math.max(
  uekY[uekY.length-1]+UH/2,
  brY[brY.length-1]+BR_H/2
) + TOP_PAD;

// ============================================================
// RENDER
// ============================================================
function renderAll() {
  const canvas = document.getElementById('tree-canvas');
  const svg    = document.getElementById('svg-conn');

  canvas.style.width  = CANVAS_W+'px';
  canvas.style.height = CANVAS_H+'px';
  svg.setAttribute('width',  CANVAS_W);
  svg.setAttribute('height', CANVAS_H);

  // Clear
  svg.innerHTML = '';
  canvas.querySelectorAll('.node').forEach(n=>n.remove());

  drawConnections(svg);
  renderUEKs(canvas);
  renderBLJ(canvas);
  renderBranches(canvas);
  renderHKs(canvas);
  renderIPA(canvas);
  renderEFZ(canvas);

  const p = getProgress();
  document.getElementById('prog-fill').style.width = p+'%';
  document.getElementById('prog-lbl').textContent  = p+'%';
}

// ── SVG lines ──────────────────────────────────────────────
function line(svg, x1,y1,x2,y2, done) {
  const el = document.createElementNS('http://www.w3.org/2000/svg','line');
  el.setAttribute('x1',x1); el.setAttribute('y1',y1);
  el.setAttribute('x2',x2); el.setAttribute('y2',y2);
  el.setAttribute('stroke', done ? '#68d391' : '#c8d0da');
  el.setAttribute('stroke-width', done ? '2.5' : '1.5');
  if (!done) el.setAttribute('stroke-dasharray','5 3');
  svg.appendChild(el);
}

function drawConnections(svg) {
  const blu = bljDone();

  // UEKs → BLJ
  BP.ueks.forEach((u,i) => line(svg, UX+UW/2, uekY[i], BLX-BW/2, MID_Y, ST.ueks[u.id]));

  // BLJ → Branches
  BP.branches.forEach((b,i) => line(svg, BLX+BW/2, MID_Y, BRX-BW/2, brY[i], blu));

  // Branch → HKs (fan)
  BP.branches.forEach((b,bi) => {
    b.hks.forEach((k,ki) => {
      const cx = HX0 + ki*HS;
      const done = ST.hks[k.id] > 0 && blu;
      line(svg, BRX+BW/2, brY[bi], cx-HW/2, brY[bi], done);
    });
  });

  // Last HK of each branch → IPA
  BP.branches.forEach((b,bi) => {
    const lastCx = HX0 + (b.hks.length-1)*HS;
    line(svg, lastCx+HW/2, brY[bi], IPX-IW/2, MID_Y, branchDone(b));
  });

  // IPA → EFZ
  line(svg, IPX+IW/2, MID_Y, EFX-EW/2, MID_Y, ipaUnlocked());
}

// ── Node factory ──────────────────────────────────────────
function mkNode(id, cx, cy, w, h, cls, extraCls, onClick) {
  const d = document.createElement('div');
  d.className = 'node '+cls+(extraCls?' '+extraCls:'')+(onClick?' clickable':'');
  d.style.left   = (cx-w/2)+'px';
  d.style.top    = (cy-h/2)+'px';
  d.style.width  = w+'px';
  d.style.height = h+'px';
  d.dataset.id   = id;
  if (onClick) d.addEventListener('click', onClick);
  return d;
}

function addLabel(node, supra, label) {
  if (supra) { const s=document.createElement('div'); s.className='node-supra'; s.textContent=supra; node.appendChild(s); }
  const l=document.createElement('div'); l.className='node-label'; l.textContent=label; node.appendChild(l);
}

function addPips(node, stage) {
  const pd=document.createElement('div'); pd.className='pips';
  for (let i=0;i<3;i++){
    const p=document.createElement('div');
    p.className='pip'+(i<stage?' s'+(i<stage ? Math.min(stage,3) : 0):'');
    // remap: pip 0 uses s1 class if stage>=1, pip 1 uses s2 if stage>=2, pip 2 uses s3 if stage>=3
    p.className = 'pip' + (i<stage ? ' s'+(i+1) : '');
    pd.appendChild(p);
  }
  node.appendChild(pd);
}

// ── Section renderers ──────────────────────────────────────
function renderUEKs(canvas) {
  BP.ueks.forEach((u,i) => {
    const done = ST.ueks[u.id];
    const n = mkNode(u.id, UX, uekY[i], UW, UH, done?'complete':'active', '', ()=>toggleUEK(u.id));
    addLabel(n, u.nr, u.bez.length>32 ? u.bez.slice(0,30)+'…' : u.bez);
    canvas.appendChild(n);
  });
}

function renderBLJ(canvas) {
  const done = bljDone();
  const cls = done ? 'complete' : (allUEKsDone() ? 'active' : 'locked');
  const n = mkNode('blj', BLX, MID_Y, BW, BH, cls);
  const ic=document.createElement('div'); ic.className='node-icon'; ic.textContent='🎓'; n.appendChild(ic);
  addLabel(n, null, 'Basislehrjahr');
  canvas.appendChild(n);
}

function renderBranches(canvas) {
  BP.branches.forEach((b,i) => {
    const unlocked = bljDone();
    const done = branchDone(b);
    let cls = 'locked', extra='';
    if (unlocked && done) { cls='complete'; }
    else if (unlocked) { cls='active'; extra=b.cls; }
    const n = mkNode('br_'+b.id, BRX, brY[i], BW, BH, cls, extra);
    addLabel(n, 'Bereich '+b.id, b.bez.length>26 ? b.bez.slice(0,24)+'…' : b.bez);
    canvas.appendChild(n);
  });
}

function renderHKs(canvas) {
  BP.branches.forEach((b,bi) => {
    b.hks.forEach((k,ki) => {
      const unlocked = hkUnlocked();
      const stage    = ST.hks[k.id];
      let cls  = 'locked', extra='';
      if (unlocked) {
        cls   = stage===3 ? 'complete' : stage>0 ? 'partial' : 'active';
        extra = b.hkcls;
      }
      const cx = HX0 + ki*HS;
      const n  = mkNode(k.id, cx, brY[bi], HW, HH, cls, extra, unlocked?()=>openDetail(k.id):null);
      addLabel(n, k.id.toUpperCase(), k.bez.length>24 ? k.bez.slice(0,22)+'…' : k.bez);
      if (unlocked) addPips(n, stage);
      canvas.appendChild(n);
    });
  });
}

function renderIPA(canvas) {
  const unlocked = ipaUnlocked();
  const cls = unlocked ? 'complete' : 'locked';
  const n = mkNode('ipa', IPX, MID_Y, IW, IH, cls);
  const ic=document.createElement('div'); ic.className='node-icon'; ic.textContent='📋'; n.appendChild(ic);
  addLabel(n, null, 'IPA');
  canvas.appendChild(n);
}

function renderEFZ(canvas) {
  const unlocked = ipaUnlocked();
  const n = mkNode('efz', EFX, MID_Y, EW, EH, 'special'+(unlocked?'':' locked'));
  const ic=document.createElement('div'); ic.className='node-icon'; ic.textContent=unlocked?'🏆':'🔒'; n.appendChild(ic);
  addLabel(n, null, 'EFZ');
  canvas.appendChild(n);
}

// ============================================================
// INTERACTIONS
// ============================================================
function toggleUEK(id) {
  ST.ueks[id] = !ST.ueks[id];
  saveST(); checkMilestones(); renderAll();
}

let selID = null;

function openDetail(id) {
  selID = id;
  const hk = findHK(id);
  if (!hk) return;
  document.getElementById('d-id').textContent    = id.toUpperCase() + ' – Handlungskompetenz';
  document.getElementById('d-title').textContent = hk.bez;
  document.getElementById('detail-desc').textContent = hk.desc;
  refreshPanel();
  document.getElementById('detail').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  selID = null;
}

function findHK(id) {
  for (const b of BP.branches) { const k = b.hks.find(h=>h.id===id); if(k) return k; }
  return null;
}

function refreshPanel() {
  if (!selID) return;
  const stage = ST.hks[selID]||0;
  const LABELS = ['Erklärt','Geübt','Selbständig'];
  ['s1','s2','s3'].forEach((sid,i) => {
    const el = document.getElementById(sid);
    el.className = 'stage-box';
    if (i < stage)     el.classList.add('done');
    if (i === stage && stage < 3) el.classList.add('current');
  });
  const btn = document.getElementById('act-btn');
  if (stage < 3) {
    btn.disabled = false;
    btn.textContent = 'Als ' + LABELS[stage] + ' markieren';
  } else {
    btn.disabled = true;
    btn.textContent = '✓ Vollständig abgeschlossen';
  }
}

function advance() {
  if (!selID) return;
  const cur = ST.hks[selID]||0;
  if (cur >= 3) return;
  ST.hks[selID] = cur+1;
  saveST(); checkMilestones(); renderAll(); refreshPanel();
  const L = ['Erklärt','Geübt','Selbständig'];
  toast(selID.toUpperCase()+': Stufe "'+L[ST.hks[selID]-1]+'" erreicht', false);
}

// ============================================================
// MILESTONES (Modul-3 hooks)
// ============================================================
const achieved = new Set((ST.milestones||[]));

function checkMilestones() {
  const fire = (id, lbl, desc) => {
    if (achieved.has(id)) return;
    achieved.add(id);
    ST.milestones = [...achieved];
    console.log('[MILESTONE]', id, desc);
    toast(lbl, true);
  };

  if (allUEKsDone())
    fire('UEK_COMPLETE','🎓 Alle ÜKs abgeschlossen!','Basislehrjahr freigeschaltet.');

  if (bljDone())
    fire('BASISLEHRJAHR_COMPLETE','🎓 Basislehrjahr abgeschlossen!','Alle Kompetenzbereiche zugänglich.');

  BP.branches.forEach(b => {
    if (branchDone(b))
      fire('BRANCH_'+b.id,'⭐ Bereich '+b.id+' abgeschlossen!', b.bez+' vollständig gemeistert.');
  });

  const comp = completedHKs(), tot = totalHKs();
  if (comp >= Math.ceil(tot*0.5))
    fire('HALFWAY','📊 Halbzeit!','50 % aller Handlungskompetenzen selbständig.');
  if (comp >= Math.ceil(tot*0.75))
    fire('ALMOST_DONE','🔥 Fast geschafft!','75 % aller Handlungskompetenzen selbständig.');
  if (ipaUnlocked())
    fire('IPA_UNLOCKED','📋 IPA freigeschaltet!','Alle Handlungskompetenzen auf Stufe Selbständig.');
  if (ipaUnlocked())
    fire('EFZ_COMPLETE','🏆 EFZ erreicht! Herzlichen Glückwunsch!','Abschluss erfolgreich.');
}

// ============================================================
// TOAST
// ============================================================
let _tt = null;
function toast(msg, milestone) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show'+(milestone?' milestone':'');
  clearTimeout(_tt);
  _tt = setTimeout(()=>t.className='', 3800);
}

// ============================================================
// INIT
// ============================================================
renderAll();
</script>
